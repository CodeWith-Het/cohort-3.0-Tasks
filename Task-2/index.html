<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Positioning Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <!-- Background Banner -->
        <div class="banner"></div>

        <!-- Profile Section (Uses Relative Positioning) -->
        <div class="profile-container">
            <div class="avatar">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-y-fFn8KjGMJWwHyFA32_Xvysu-c0c3pHIw&s" alt="Profile">
                <!-- Status Badge (Uses Absolute Positioning) -->
                <span class="status-badge"></span>
            </div>
        </div>

        <!-- Content Section (Uses Flexbox) -->
        <div class="content">
            <h1>Hetx patel</h1>
            <p>Frontend Developer</p>
            <div class="stats">
                <span><strong>20</strong> Projects</span>
                <span><strong>1.2k</strong> Followers</span>
            </div>
            <button>Follow</button>
        </div>
    </div>

</body>
</html>
