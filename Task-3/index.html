<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 3 - Flexbox & Position</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">

        <div class="card product-card">
            <span class="badge">Trending</span>

            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="Product">

            <div class="content">
                <h4>Premium Watch</h4>
                <p>$299.00</p>
            </div>
        </div>

        <div class="card profile-card">
            <div class="avatar-container">
                <img src="https://i.pravatar.cc/150?img=3" alt="User">
                <div class="status-dot"></div>
            </div>

            <div class="content">
                <h4>Het Patel</h4>
                <p>Full-Stack Developer</p>
            </div>
        </div>

        <div class="banner">
            <div class="overlay">
                <h2>Creative Design</h2>
                <button>Explore More</button>
            </div>

            <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=800" alt="Banner">
        </div>

    </div>

</body>
</html>
